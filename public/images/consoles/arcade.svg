<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="screenglow"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Cabinet body -->
  <path d="M55 175 L55 60 Q55 25 100 20 Q145 25 145 60 L145 175 Z" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Monitor bezel -->
  <rect x="65" y="35" width="70" height="60" rx="5" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Screen glow -->
  <rect x="68" y="38" width="64" height="54" rx="3" fill="#00d4ff" opacity="0.12" filter="url(#screenglow)"/>
  <!-- Marquee light strip -->
  <rect x="60" y="22" width="80" height="12" rx="3" fill="#00d4ff" opacity="0.4" filter="url(#glow)"/>
  <!-- Control panel -->
  <rect x="55" y="112" width="90" height="35" rx="5" fill="#0d1e36" stroke="#6ecbf5" stroke-width="1.5"/>
  <!-- Joystick -->
  <circle cx="80" cy="130" r="8" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <circle cx="80" cy="128" r="5" fill="#6ecbf5" opacity="0.8"/>
  <!-- Buttons row -->
  <circle cx="105" cy="125" r="6" fill="#ff4444" filter="url(#glow)"/>
  <circle cx="118" cy="125" r="6" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="131" cy="125" r="6" fill="#ffaa00" filter="url(#glow)"/>
  <circle cx="118" cy="137" r="6" fill="#00ff88" filter="url(#glow)"/>
  <!-- Coin slot -->
  <rect x="85" y="152" width="30" height="5" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <text x="100" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">ARCADE</text>
</svg>
