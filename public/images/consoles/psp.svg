<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- PSP body -->
  <rect x="10" y="55" width="180" height="100" rx="22" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Screen -->
  <rect x="42" y="64" width="116" height="72" rx="5" fill="#0d2a1a" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="45" y="67" width="110" height="66" rx="3" fill="#00d4ff" opacity="0.07"/>
  <!-- D-pad left -->
  <rect x="15" y="93" width="22" height="7" rx="2" fill="#6ecbf5" opacity="0.8"/>
  <rect x="21" y="87" width="7" height="20" rx="2" fill="#6ecbf5" opacity="0.8"/>
  <!-- Buttons right -->
  <circle cx="175" cy="100" r="6" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <circle cx="168" cy="93" r="6" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Analog nub -->
  <circle cx="28" cy="82" r="7" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <!-- UMD disc -->
  <circle cx="172" cy="130" r="10" fill="#050d1a" stroke="#00d4ff" stroke-width="1" filter="url(#glow)"/>
  <text x="100" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">PSP</text>
</svg>
