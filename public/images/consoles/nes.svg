<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Body -->
  <rect x="20" y="60" width="160" height="100" rx="8" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Cartridge slot -->
  <rect x="40" y="75" width="80" height="30" rx="3" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- LED dot -->
  <circle cx="145" cy="90" r="5" fill="#00d4ff" filter="url(#glow)"/>
  <!-- Reset / Power buttons -->
  <rect x="130" y="105" width="16" height="8" rx="4" fill="#6ecbf5" opacity="0.8"/>
  <rect x="150" y="105" width="16" height="8" rx="4" fill="#00d4ff" opacity="0.9" filter="url(#glow)"/>
  <!-- Controller ports -->
  <rect x="30" y="140" width="22" height="12" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="60" y="140" width="22" height="12" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <!-- Label text -->
  <text x="100" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">NES</text>
</svg>
