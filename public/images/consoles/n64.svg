<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Main body -->
  <path d="M40 80 L160 80 L170 150 L30 150 Z" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Cartridge slot on top -->
  <rect x="70" y="50" width="60" height="35" rx="4" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- The N64 ridge/bump top center -->
  <ellipse cx="100" cy="80" rx="35" ry="12" fill="#0d1e36" stroke="#6ecbf5" stroke-width="1"/>
  <!-- Power button -->
  <circle cx="80" cy="120" r="8" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Reset button -->
  <circle cx="100" cy="125" r="5" fill="#6ecbf5" opacity="0.7"/>
  <!-- Expansion pak -->
  <rect x="115" y="108" width="30" height="18" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <text x="100" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">N64</text>
</svg>
