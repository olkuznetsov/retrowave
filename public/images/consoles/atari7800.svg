<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="20" y="60" width="160" height="80" rx="8" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Cart slot -->
  <rect x="65" y="45" width="70" height="20" rx="3" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Atari "fuji" logo area -->
  <path d="M90 95 L100 75 L110 95 Z" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <rect x="85" y="95" width="30" height="5" rx="1" fill="#00d4ff" opacity="0.6"/>
  <!-- Difficulty/pause switches -->
  <rect x="28" y="80" width="10" height="16" rx="2" fill="#6ecbf5" opacity="0.7"/>
  <rect x="44" y="80" width="10" height="16" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <!-- Power LED -->
  <circle cx="160" cy="88" r="5" fill="#ff8800" filter="url(#glow)"/>
  <!-- Controller ports -->
  <rect x="28" y="118" width="22" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="58" y="118" width="22" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <text x="100" y="175" text-anchor="middle" font-family="monospace" font-size="10" fill="#6ecbf5" opacity="0.8">ATARI 7800</text>
</svg>
