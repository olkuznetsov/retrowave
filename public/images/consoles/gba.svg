<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="15" y="55" width="170" height="100" rx="20" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Screen -->
  <rect x="60" y="65" width="80" height="55" rx="4" fill="#0d2a1a" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="63" y="68" width="74" height="49" rx="2" fill="#00d4ff" opacity="0.07"/>
  <!-- L/R shoulder buttons -->
  <rect x="15" y="48" width="30" height="12" rx="6" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="155" y="48" width="30" height="12" rx="6" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <!-- D-pad -->
  <rect x="22" y="88" width="30" height="9" rx="2" fill="#6ecbf5" opacity="0.7"/>
  <rect x="31" y="79" width="9" height="28" rx="2" fill="#6ecbf5" opacity="0.7"/>
  <!-- A/B buttons -->
  <circle cx="162" cy="93" r="9" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <circle cx="148" cy="100" r="9" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Start/Select -->
  <rect x="83" y="128" width="14" height="5" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <rect x="103" y="128" width="14" height="5" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <text x="100" y="180" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">GBA</text>
</svg>
