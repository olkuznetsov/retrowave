<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Tall slim tower body -->
  <rect x="65" y="20" width="70" height="155" rx="8" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- DVD tray -->
  <rect x="72" y="45" width="56" height="18" rx="3" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="74" y="47" width="52" height="14" rx="2" fill="#0d1e36"/>
  <!-- Disc indicator -->
  <circle cx="118" cy="54" r="4" fill="#00d4ff" filter="url(#glow)"/>
  <!-- USB ports -->
  <rect x="72" y="80" width="12" height="8" rx="1" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <rect x="90" y="80" width="12" height="8" rx="1" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <!-- Memory card -->
  <rect x="72" y="100" width="18" height="25" rx="2" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <rect x="96" y="100" width="18" height="25" rx="2" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <!-- Power button -->
  <rect x="72" y="145" width="56" height="14" rx="7" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="100" cy="152" r="5" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <text x="100" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">PS2</text>
</svg>
