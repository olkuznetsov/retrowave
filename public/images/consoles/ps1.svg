<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Main body - long flat shape -->
  <rect x="15" y="65" width="170" height="80" rx="8" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Disc lid -->
  <ellipse cx="90" cy="90" rx="55" ry="30" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <ellipse cx="90" cy="90" rx="40" ry="22" fill="#0a1628" stroke="#6ecbf5" stroke-width="1"/>
  <circle cx="90" cy="90" r="8" fill="#00d4ff" opacity="0.4" filter="url(#glow)"/>
  <!-- Power/Reset -->
  <circle cx="165" cy="80" r="6" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="165" cy="100" r="4" fill="#6ecbf5" opacity="0.7"/>
  <!-- Controller ports -->
  <rect x="20" y="115" width="20" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="45" y="115" width="20" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <!-- Memory card slots -->
  <rect x="75" y="115" width="14" height="14" rx="2" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <rect x="95" y="115" width="14" height="14" rx="2" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <text x="100" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">PS1</text>
</svg>
