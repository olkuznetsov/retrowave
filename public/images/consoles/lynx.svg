<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Wide landscape handheld -->
  <rect x="10" y="50" width="180" height="110" rx="14" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Screen (center) -->
  <rect x="45" y="62" width="110" height="70" rx="5" fill="#0d2a1a" stroke="#00d4ff" stroke-width="1.5"/>
  <rect x="48" y="65" width="104" height="64" rx="3" fill="#00d4ff" opacity="0.07"/>
  <!-- D-pad left -->
  <rect x="14" y="94" width="24" height="7" rx="2" fill="#6ecbf5" opacity="0.8"/>
  <rect x="20" y="88" width="7" height="20" rx="2" fill="#6ecbf5" opacity="0.8"/>
  <!-- A/B buttons right -->
  <circle cx="173" cy="96" r="8" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <circle cx="160" cy="104" r="8" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Cart slot top -->
  <rect x="70" y="44" width="60" height="12" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <!-- Pause / Option buttons -->
  <rect x="82" y="143" width="14" height="6" rx="3" fill="#6ecbf5" opacity="0.6"/>
  <rect x="104" y="143" width="14" height="6" rx="3" fill="#6ecbf5" opacity="0.6"/>
  <text x="100" y="183" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">ATARI LYNX</text>
</svg>
