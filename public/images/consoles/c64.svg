<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Keyboard computer body -->
  <rect x="10" y="65" width="180" height="85" rx="8" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Screen/LED strip at top -->
  <rect x="10" y="58" width="180" height="12" rx="4" fill="#0d1e36" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Power LED -->
  <circle cx="170" cy="64" r="5" fill="#00ff44" filter="url(#glow)"/>
  <!-- C64 key layout rows -->
