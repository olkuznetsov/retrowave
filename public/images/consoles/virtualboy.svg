<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="redglow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Visor body -->
  <rect x="20" y="60" width="160" height="60" rx="30" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Red eye lenses - iconic VB look -->
  <circle cx="70" cy="90" r="22" fill="#200000" stroke="#ff2200" stroke-width="2" filter="url(#redglow)"/>
  <circle cx="130" cy="90" r="22" fill="#200000" stroke="#ff2200" stroke-width="2" filter="url(#redglow)"/>
  <circle cx="70" cy="90" r="12" fill="#ff0000" opacity="0.25" filter="url(#redglow)"/>
  <circle cx="130" cy="90" r="12" fill="#ff0000" opacity="0.25" filter="url(#redglow)"/>
  <!-- Stand legs -->
  <line x1="55" y1="120" x2="40" y2="170" stroke="#6ecbf5" stroke-width="3" stroke-linecap="round"/>
  <line x1="145" y1="120" x2="160" y2="170" stroke="#6ecbf5" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="120" x2="100" y2="165" stroke="#6ecbf5" stroke-width="3" stroke-linecap="round"/>
  <text x="100" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff2200" opacity="0.9" filter="url(#redglow)">VIRTUAL BOY</text>
</svg>
