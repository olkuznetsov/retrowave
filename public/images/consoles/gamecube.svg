<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Body cube shape -->
  <rect x="35" y="40" width="130" height="130" rx="12" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Disc lid circle -->
  <circle cx="100" cy="90" r="45" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <circle cx="100" cy="90" r="30" fill="#0a1628" stroke="#6ecbf5" stroke-width="1"/>
  <circle cx="100" cy="90" r="10" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <!-- Power button -->
  <circle cx="55" cy="148" r="9" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Reset -->
  <circle cx="75" cy="152" r="5" fill="#6ecbf5" opacity="0.7"/>
  <!-- Memory card slots -->
  <rect x="120" y="138" width="16" height="22" rx="2" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <rect x="140" y="138" width="16" height="22" rx="2" fill="#050d1a" stroke="#6ecbf5" stroke-width="1"/>
  <text x="100" y="190" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">GAMECUBE</text>
</svg>
