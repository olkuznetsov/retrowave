<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Body -->
  <rect x="20" y="55" width="160" height="95" rx="12" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Cartridge slot -->
  <rect x="55" y="65" width="90" height="25" rx="4" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Power LED -->
  <circle cx="148" cy="88" r="4" fill="#00d4ff" filter="url(#glow)"/>
  <!-- Eject button -->
  <rect x="80" y="95" width="40" height="9" rx="4" fill="#6ecbf5" opacity="0.7"/>
  <!-- Controller ports -->
  <rect x="28" y="128" width="24" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="148" y="128" width="24" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <text x="100" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">SNES</text>
</svg>
