<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Body -->
  <rect x="55" y="15" width="90" height="170" rx="14" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Screen bezel -->
  <rect x="65" y="28" width="70" height="60" rx="5" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="72" y="35" width="56" height="46" rx="3" fill="#0d2a1a" stroke="#00d4ff" stroke-width="1"/>
  <!-- Screen glow -->
  <rect x="74" y="37" width="52" height="42" rx="2" fill="#00d4ff" opacity="0.08"/>
  <!-- Power LED -->
  <circle cx="72" cy="100" r="4" fill="#00d4ff" filter="url(#glow)"/>
  <!-- D-pad -->
  <rect x="65" y="108" width="28" height="9" rx="2" fill="#6ecbf5" opacity="0.8"/>
  <rect x="74" y="100" width="9" height="26" rx="2" fill="#6ecbf5" opacity="0.8"/>
  <!-- A/B buttons -->
  <circle cx="130" cy="118" r="8" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <circle cx="115" cy="124" r="8" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Start/Select -->
  <rect x="78" y="142" width="18" height="5" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <rect x="104" y="142" width="18" height="5" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <text x="100" y="195" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">GAME BOY</text>
</svg>
