<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Genesis base -->
  <rect x="15" y="100" width="170" height="55" rx="6" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- 32X addon (mushroom shaped on top) -->
  <rect x="55" y="50" width="90" height="55" rx="8" fill="#0d1e36" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
  <!-- 32X cartridge slot on top -->
  <rect x="70" y="35" width="60" height="20" rx="3" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- 32X label -->
  <text x="100" y="83" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="16" fill="#ff6600" filter="url(#glow)">32X</text>
  <!-- Power LED -->
  <circle cx="158" cy="115" r="5" fill="#ff6600" filter="url(#glow)"/>
  <!-- Controller ports -->
  <rect x="25" y="130" width="22" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="55" y="130" width="22" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <text x="100" y="183" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">SEGA 32X</text>
</svg>
