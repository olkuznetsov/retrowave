<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <!-- Body with wood panel look -->
  <rect x="20" y="65" width="160" height="80" rx="6" fill="#0a1628" stroke="#6ecbf5" stroke-width="2" filter="url(#glow)"/>
  <!-- Wood panel stripe -->
  <rect x="20" y="100" width="160" height="18" rx="0" fill="#1a3020" stroke="#00d4ff" stroke-width="0.5" opacity="0.6"/>
  <!-- Cartridge slot -->
  <rect x="70" y="52" width="60" height="18" rx="3" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Difficulty switches -->
  <rect x="30" y="78" width="10" height="16" rx="2" fill="#6ecbf5" opacity="0.7"/>
  <rect x="46" y="78" width="10" height="16" rx="2" fill="#6ecbf5" opacity="0.6"/>
  <!-- Power / reset -->
  <circle cx="155" cy="88" r="6" fill="#050d1a" stroke="#00d4ff" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="170" cy="88" r="4" fill="#6ecbf5" opacity="0.7"/>
  <!-- Controller ports -->
  <rect x="30" y="120" width="22" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <rect x="60" y="120" width="22" height="14" rx="3" fill="#050d1a" stroke="#6ecbf5" stroke-width="1.5"/>
  <text x="100" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ecbf5" opacity="0.8">ATARI 2600</text>
</svg>
