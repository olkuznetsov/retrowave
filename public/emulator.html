<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>RetroWave Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; overflow: hidden; width: 100%; height: 100%; }
    #game {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      /* Respect iPhone Dynamic Island / notch safe areas */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Tap-to-start overlay — iOS needs user gesture BEFORE emulator loads to unlock AudioContext */
    #tap-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #tap-overlay .play-icon {
      width: 80px;
      height: 80px;
      border: 3px solid rgba(110, 203, 245, 0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tap-overlay .play-icon svg {
      width: 36px;
      height: 36px;
      fill: rgba(110, 203, 245, 0.9);
      margin-left: 4px;
    }
    #tap-overlay .tap-text {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #tap-overlay .game-name {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 22px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      margin-bottom: 8px;
    }
    #tap-overlay.hidden { display: none; }
  </style>
</head>
<body>
  <!-- Tap-to-start overlay (iOS needs user gesture for audio) -->
  <div id="tap-overlay">
    <div class="game-name" id="overlay-title"></div>
    <div class="play-icon">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </div>
    <div class="tap-text">Tap to Play</div>
  </div>

  <div id="game"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const LOADER_URL = 'https://pub-44598954bf774754af38263b7890873b.r2.dev/emulatorjs/loader.js';

    // Show game name on overlay
    const gameName = params.get('name') || 'Game';
    document.getElementById('overlay-title').textContent = gameName;

    function configureEmulator() {
      // EmulatorJS configuration
      EJS_player = '#game';
      EJS_core = params.get('core') || 'fceumm';
      EJS_gameUrl = params.get('rom') || '';
      EJS_gameName = gameName;
      EJS_color = '#1a4a7a';
      EJS_startOnLoaded = true;

      // EmulatorJS v4.2.3 hosted on Cloudflare R2
      EJS_pathtodata = 'https://pub-44598954bf774754af38263b7890873b.r2.dev/emulatorjs/';

      // Disable IndexedDB caching — iOS Safari rejects large ROMs (>50MB quota)
      EJS_disableDatabases = true;

      // 16:9 widescreen for PS1
      if (EJS_core === 'pcsx_rearmed') {
        EJS_defaultOptions = { 'pcsx_rearmed_aspect_ratio': '16:9' };
      }

      // Optional BIOS
      if (params.get('bios')) {
        EJS_biosUrl = params.get('bios');
      }

      // On mobile: wire the EmulatorJS "exit" action to go back to the app
      var returnUrl = params.get('returnUrl');
      if (returnUrl) {
        EJS_ExitLink = returnUrl;
      }

      // Save state callback — send to parent window (desktop iframe)
      EJS_onSaveState = function(state) {
        try { window.parent.postMessage({ type: 'save-state', data: state }, window.location.origin); } catch (e) {}
      };
      EJS_onSaveUpdate = function(save) {
        try { window.parent.postMessage({ type: 'save-update', data: save }, window.location.origin); } catch (e) {}
      };
    }

    function loadEmulatorScript() {
      var s = document.createElement('script');
      s.src = LOADER_URL;
      document.body.appendChild(s);
    }

    if (isMobile) {
      // Mobile: wait for user tap to unlock AudioContext, THEN load EmulatorJS
      document.getElementById('tap-overlay').addEventListener('click', function() {
        this.classList.add('hidden');

        // Create and resume AudioContext during user gesture — unlocks iOS audio pipeline
        var AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          var ctx = new AudioCtx();
          var buf = ctx.createBuffer(1, 1, 22050);
          var src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(ctx.destination);
          src.start(0);
          ctx.resume().then(function() { ctx.close(); });
        }

        // Now configure and load EmulatorJS — audio will work because gesture just happened
        configureEmulator();
        loadEmulatorScript();
      });
    } else {
      // Desktop: hide overlay, load immediately
      document.getElementById('tap-overlay').classList.add('hidden');
      configureEmulator();
      loadEmulatorScript();
    }
  </script>
</body>
</html>
